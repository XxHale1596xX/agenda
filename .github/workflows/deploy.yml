# GitHub Actions — agenda-api
# Repo: github.com/XxHale1596xX/agenda
#
# Secrets necessários no GitHub (Settings → Secrets → Actions):
#   ACR_LOGIN_SERVER  — agrlexacr.azurecr.io
#   ACR_USERNAME      — appId do Service Principal com role AcrPush
#   ACR_PASSWORD      — senha do Service Principal

name: Build & Push — agenda-api

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'requirements.txt'

env:
  IMAGE_NAME: agenda-api

jobs:
  build:
    name: Build & Push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}-${{ github.run_number }}"
          FULL_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${IMAGE_TAG}"

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Summary
        run: |
          echo "Image: ${{ steps.tag.outputs.full_image }}"
